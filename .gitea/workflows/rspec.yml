name: RSpec Tests

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0, 1]
        ci_node_total: [2]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rubyci_homepage_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_ADAPTER: postgresql
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'

      - name: Cache bundle
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: bundle-${{ hashFiles('Gemfile.lock') }}
          restore-keys: bundle-

      - name: Install dependencies
        run: |
          bundle config mirror.https://rubygems.org https://gems.ruby.ci
          bundle install --jobs 4 --retry 3 --path vendor/bundle

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Split and run RSpec
        run: |
          FILES=$(find spec -name '*_spec.rb' | sort | awk "NR % ${{ matrix.ci_node_total }} == ${{ matrix.ci_node_index }}")
          echo "Running: $FILES"
          bundle exec rspec $FILES
