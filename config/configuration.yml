default: &default
  site:
    app_domain:  <%= ENV.fetch("APP_DOMAIN") { '' } %>
    ghost_api_host: <%= ENV.fetch("GHOST_API_HOST") { '' } %>
    ghost_api_content_key: <%= ENV.fetch("GHOST_CONTENT_API_KEY") { '' } %>
  domains:
    # Add domain-specific Ghost API configuration here
    # Format: domain_without_dots: { host: ghost_blog_url, key: api_key }
    litetracker.com:
      host: https://blog.litetracker.com
      key: <%= ENV.fetch("GHOST_CONTENT_API_KEY_LITETRACKER") { '' } %>
    kolosek.com:
      host: https://blog.kolosek.com
      key: <%= ENV.fetch("GHOST_CONTENT_API_KEY_KOLOSEK") { '' } %>
    ruby.ci:
      host: https://blog.ruby.ci
      key: <%= ENV.fetch("GHOST_CONTENT_API_KEY_RUBYCI") { '' } %>
    fast.ci:
      host: https://blog.fast.ci
      key: <%= ENV.fetch("GHOST_CONTENT_API_KEY_FASTCI") { '' } %>


test:
  <<: *default

development:
  <<: *default

production:
  <<: *default
